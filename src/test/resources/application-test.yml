spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

api:
  whitelist:
    enabled: false
    ips:
      - 127.0.0.1
    protected-paths:
      - /api/sync/**

dap:
  base-url: http://localhost:8080/dap/mock
